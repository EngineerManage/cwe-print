name: Build & Release

# 触发方式：
#  1) 推送到 main / master 分支 → 构建 win+mac，并把安装包发布到 Releases
#  2) 手动在 Actions 页面点击 Run workflow → 同样构建并发布
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# 发布 Release 需要写权限
permissions:
  contents: write

jobs:
  # ── 1) 分平台构建，产物先上传为 artifact（不直接发布，避免两端同时写同一 Release 冲突）──
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: npm run build && npx electron-builder --mac --publish never

      - name: Build (Windows)
        if: matrix.platform == 'win'
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installers
          retention-days: 14
          if-no-files-found: warn
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml

  # ── 2) 汇总所有平台产物，发布到同一个 Release ──
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          # 同版本重复推送时，会更新这同一个 Release 的安装包（最新构建覆盖旧的）
          files: artifacts/**/*
          fail_on_unmatched_files: false
