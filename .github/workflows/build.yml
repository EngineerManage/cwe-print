name: Build & Release

# 触发方式：
#  1) 推送 v 开头的 tag（如 v1.0.1）→ 构建并发布到 GitHub Release
#  2) 手动在 Actions 页面点击 Run workflow → 仅构建并上传产物（不发布 Release）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 允许 workflow 创建 Release
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 仅在推送 tag 时让 electron-builder 直接发布到 GitHub Release；
      # 手动触发时只构建，不发布。
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: npm run build && npx electron-builder --mac ${{ startsWith(github.ref, 'refs/tags/') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build (Windows)
        if: matrix.platform == 'win'
        run: npm run build && npx electron-builder --win ${{ startsWith(github.ref, 'refs/tags/') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # 把安装包作为构建产物上传（手动触发或想直接下载时使用）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installers
          retention-days: 14
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
